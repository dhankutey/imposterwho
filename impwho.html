<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter Game</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --primary-color: #3b82f6;
            --danger-color: #ef4444;
            --text-color: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #27272a;
            border: 2px solid #3f3f46;
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .instruction {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .secret-box {
            background-color: #27272a;
            border: 2px dashed #52525b;
            padding: 40px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            user-select: none;
        }

        .secret-box.revealed {
            border-style: solid;
            background-color: #1e293b;
        }

        .secret-box.imposter {
            border-color: var(--danger-color);
            color: var(--danger-color);
            background-color: #451a03;
        }

        .secret-box.innocent {
            border-color: #10b981;
            color: #10b981;
            background-color: #064e3b;
        }

        .tap-prompt {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="setup-screen" class="screen active">
            <h1>Imposter Setup</h1>
            <div class="form-group">
                <label for="total-players">Number of Players</label>
                <select id="total-players"></select>
            </div>
            <div class="form-group">
                <label for="imposter-count">Number of Imposters</label>
                <select id="imposter-count"></select>
            </div>
            <button id="start-btn">Start Game</button>
            <div id="error-msg" class="error-message"></div>
        </div>

        <div id="pass-screen" class="screen">
            <h1 id="player-turn-title">Player 1</h1>
            <p class="instruction">Pass the phone to <span id="player-name-span">Player 1</span>. Make sure no one else is watching!</p>
            <button id="confirm-pass-btn">I am ready</button>
        </div>

        <div id="reveal-screen" class="screen">
            <h1 id="reveal-title">Player 1</h1>
            <div id="secret-box" class="secret-box">
                <span>Tap to reveal your secret</span>
                <span class="tap-prompt">(Hold or tap to see)</span>
            </div>
            <button id="done-reveal-btn" disabled>Next Player</button>
        </div>

        <div id="game-over-screen" class="screen">
            <h1>All Secrets Passed!</h1>
            <p class="instruction">Everyone knows their role. Start discussing and find the imposter(s)!</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        // Word pair database for the innocent players
        const wordList = [
            "Apple", "Banana", "Coffee", "Laptop", "Bitcoin", 
            "Hollywood", "Spaghetti", "Football", "Spaceship", "Library",
            "Elevator", "Microscope", "Subway", "Helicopter", "Campfire"
        ];

        // Game State Variables
        let totalPlayers = 3;
        let imposterCount = 1;
        let playersRoles = []; 
        let currentWord = "";
        let currentPlayerIndex = 0;
        let isRevealed = false;

        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const passScreen = document.getElementById('pass-screen');
        const revealScreen = document.getElementById('reveal-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        const totalPlayersSelect = document.getElementById('total-players');
        const imposterCountSelect = document.getElementById('imposter-count');
        const startBtn = document.getElementById('start-btn');
        const errorMsg = document.getElementById('error-msg');

        const playerTurnTitle = document.getElementById('player-turn-title');
        const playerNameSpan = document.getElementById('player-name-span');
        const confirmPassBtn = document.getElementById('confirm-pass-btn');

        const revealTitle = document.getElementById('reveal-title');
        const secretBox = document.getElementById('secret-box');
        const doneRevealBtn = document.getElementById('done-reveal-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Populate dynamic dropdown options (3 to 15 players)
        function initSetupOptions() {
            for (let i = 3; i <= 15; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = i;
                totalPlayersSelect.appendChild(opt);
            }
            // Populate imposters options dynamically based on selection later, or simple list for now
            for (let i = 1; i <= 5; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = i;
                imposterCountSelect.appendChild(opt);
            }
        }

        // Logic to validate setup inputs
        function validateSetup() {
            const p = parseInt(totalPlayersSelect.value);
            const imp = parseInt(imposterCountSelect.value);
            
            if (imp >= p - 1) {
                errorMsg.innerText = `Too many imposters! Max allowed for ${p} players is ${p - 2}.`;
                errorMsg.style.display = 'block';
                return false;
            }
            errorMsg.style.display = 'none';
            totalPlayers = p;
            imposterCount = imp;
            return true;
        }

        // Initialize roles assignment array
        function setupGameData() {
            // Pick a random word from the pool
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            
            playersRoles = [];
            // Fill array with "Innocent" status
            for (let i = 0; i < totalPlayers; i++) {
                playersRoles.push({ id: i + 1, isImposter: false, word: currentWord });
            }

            // Randomly select indices to turn into imposters
            let assignedImposters = 0;
            while (assignedImposters < imposterCount) {
                let randIndex = Math.floor(Math.random() * totalPlayers);
                if (!playersRoles[randIndex].isImposter) {
                    playersRoles[randIndex].isImposter = true;
                    playersRoles[randIndex].word = "IMPOSTER";
                    assignedImposters++;
                }
            }
        }

        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            screen.classList.add('active');
        }

        function startPassingLoop() {
            currentPlayerIndex = 0;
            goToPassScreen();
        }

        function goToPassScreen() {
            isRevealed = false;
            secretBox.className = "secret-box";
            secretBox.innerHTML = `<span>Tap to reveal your secret</span><span class="tap-prompt">(Hold or tap to see)</span>`;
            doneRevealBtn.disabled = true;

            playerTurnTitle.innerText = `Player ${playersRoles[currentPlayerIndex].id}`;
            playerNameSpan.innerText = `Player ${playersRoles[currentPlayerIndex].id}`;
            showScreen(passScreen);
        }

        function goToRevealScreen() {
            revealTitle.innerText = `Player ${playersRoles[currentPlayerIndex].id}`;
            showScreen(revealScreen);
        }

        function handleRevealTap() {
            if (!isRevealed) {
                isRevealed = true;
                const player = playersRoles[currentPlayerIndex];
                
                if (player.isImposter) {
                    secretBox.classList.add('revealed', 'imposter');
                    secretBox.innerHTML = `You are the IMPOSTER!<br><span style="font-size:0.9rem; font-weight:normal; color:#fca5a5; margin-top:5px; display:block;">Blend in and try to guess the secret word.</span>`;
                } else {
                    secretBox.classList.add('revealed', 'innocent');
                    secretBox.innerHTML = `Secret Word:<br><span style="font-size:1.8rem; display:block; margin-top:5px;">${player.word}</span>`;
                }
                doneRevealBtn.disabled = false;
            }
        }

        function handleNextPlayer() {
            currentPlayerIndex++;
            if (currentPlayerIndex < totalPlayers) {
                goToPassScreen();
            } else {
                showScreen(gameOverScreen);
            }
        }

        // Event Listeners
        startBtn.addEventListener('click', () => {
            if (validateSetup()) {
                setupGameData();
                startPassingLoop();
            }
        });

        totalPlayersSelect.addEventListener('change', validateSetup);
        imposterCountSelect.addEventListener('change', validateSetup);

        confirmPassBtn.addEventListener('click', goToRevealScreen);
        
        secretBox.addEventListener('click', handleRevealTap);
        
        doneRevealBtn.addEventListener('click', handleNextPlayer);

        restartBtn.addEventListener('click', () => {
            showScreen(setupScreen);
        });

        // Initialize script execution
        initSetupOptions();
    </script>
</body>
</html>
