<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter Game</title>
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="container">
        <!-- SCREEN 1: SETUP -->
        <div id="setup-screen" class="screen active">
            <h1>Imposter Setup</h1>
            <div class="form-group">
                <label for="total-players">Number of Players</label>
                <select id="total-players"></select>
            </div>
            <div class="form-group">
                <label for="imposter-count">Number of Imposters</label>
                <select id="imposter-count"></select>
            </div>
            <div class="form-group">
                <label for="game-category">Enter Category (e.g., food, animal, country, tech)</label>
                <input type="text" id="game-category" placeholder="Type a category..." autocomplete="off">
            </div>
            <button id="start-btn">Start Game</button>
            <div id="error-msg" class="error-message"></div>
        </div>

        <!-- SCREEN 2: PASS PHONE -->
        <div id="pass-screen" class="screen">
            <h1 id="player-turn-title">Player 1</h1>
            <p class="instruction">Pass the phone to <span id="player-name-span">Player 1</span>. Make sure no one else is watching!</p>
            <button id="confirm-pass-btn">I am ready</button>
        </div>

        <!-- SCREEN 3: REVEAL WORD -->
        <div id="reveal-screen" class="screen">
            <h1 id="reveal-title">Player 1</h1>
            <div id="secret-box" class="secret-box">
                <span>Tap to reveal your secret</span>
                <span class="tap-prompt">(Hold or tap to see)</span>
            </div>
            <button id="done-reveal-btn" disabled>Next Player</button>
        </div>

        <!-- SCREEN 4: GAME OVER / DISCUSSION -->
        <div id="game-over-screen" class="screen">
            <h1>All Secrets Passed!</h1>
            <p class="instruction">Everyone knows their role. Start discussing and find the imposter(s)!</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered.', reg.scope))
                    .catch(err => console.log('Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
